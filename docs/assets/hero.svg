<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 582" width="960" height="582" role="img" aria-label="amberfork demo: two agent runs aligned in a terminal; a rate-limit retry is absorbed as a log-move and the step where the failing run fetched a stale policy glows amber as the fork">
<style>
  text { font-family: "Monaspace Neon", ui-monospace, "SF Mono", Menlo, "Cascadia Mono", Consolas, monospace; font-size: 15px; font-variant-numeric: tabular-nums; }
  .t { fill: #E6E6E9; }
  .muted { fill: #8A8A93; }
  .faint { fill: #55555C; }
  .cap { fill: #8A8A93; font-size: 12.5px; }
  .note { fill: #55555C; font-size: 12px; }
  .title { fill: #55555C; font-size: 12px; }

  /* One 24s master timeline; every animated element carries the same duration so the loop
     stays phase-locked (no animation-delay: it would de-sync on iterations 2+). */
  .cmd     { clip-path: inset(0 100% 0 0); animation: typing 24s steps(16, end) infinite; }
  .cursor  { fill: #E6E6E9; opacity: 0; animation: cursor 24s steps(1, end) infinite; }
  .appear  { animation: appear 24s linear infinite; }
  .ignite-fork { fill: #FF7A1A; animation: igniteFork 24s linear infinite; }
  .ignite-mark { fill: #FF7A1A; }
  .ignite-body { fill: #E6E6E9; }
  .hl { fill: #E6E6E9; opacity: 0; }
  .cap { opacity: 0; }
  .beatA { animation: beatA 24s linear infinite; }
  .beatC { animation: beatC 24s linear infinite; }
  text.cap.beatB { animation: beatB 24s linear infinite; }
  .fadeall { animation: fadeall 24s linear infinite; }
  tspan.ignite-mark.d1 { animation: igniteMark1 24s linear infinite; }
  tspan.ignite-body.d1 { animation: igniteBody1 24s linear infinite; }
  @keyframes igniteMark1 { 0%, 33.4% { fill: #8A8A93; } 34.2%, 100% { fill: #FF7A1A; } }
  @keyframes igniteBody1 { 0%, 33.4% { fill: #8A8A93; } 34.2%, 100% { fill: #E6E6E9; } }
  tspan.ignite-mark.d2 { animation: igniteMark2 24s linear infinite; }
  tspan.ignite-body.d2 { animation: igniteBody2 24s linear infinite; }
  @keyframes igniteMark2 { 0%, 34.3% { fill: #8A8A93; } 35.1%, 100% { fill: #FF7A1A; } }
  @keyframes igniteBody2 { 0%, 34.3% { fill: #8A8A93; } 35.1%, 100% { fill: #E6E6E9; } }
  tspan.ignite-mark.d3 { animation: igniteMark3 24s linear infinite; }
  tspan.ignite-body.d3 { animation: igniteBody3 24s linear infinite; }
  @keyframes igniteMark3 { 0%, 35.2% { fill: #8A8A93; } 36.0%, 100% { fill: #FF7A1A; } }
  @keyframes igniteBody3 { 0%, 35.2% { fill: #8A8A93; } 36.0%, 100% { fill: #E6E6E9; } }
  tspan.ignite-mark.d4 { animation: igniteMark4 24s linear infinite; }
  tspan.ignite-body.d4 { animation: igniteBody4 24s linear infinite; }
  @keyframes igniteMark4 { 0%, 36.1% { fill: #8A8A93; } 36.9%, 100% { fill: #FF7A1A; } }
  @keyframes igniteBody4 { 0%, 36.1% { fill: #8A8A93; } 36.9%, 100% { fill: #E6E6E9; } }
  tspan.ignite-mark.d5 { animation: igniteMark5 24s linear infinite; }
  tspan.ignite-body.d5 { animation: igniteBody5 24s linear infinite; }
  @keyframes igniteMark5 { 0%, 37.0% { fill: #8A8A93; } 37.8%, 100% { fill: #FF7A1A; } }
  @keyframes igniteBody5 { 0%, 37.0% { fill: #8A8A93; } 37.8%, 100% { fill: #E6E6E9; } }

  @keyframes typing  { 0% { clip-path: inset(0 100% 0 0); } 1.2% { clip-path: inset(0 100% 0 0); } 6% { clip-path: inset(0 -2px 0 0); } 100% { clip-path: inset(0 -2px 0 0); } }
  @keyframes cursor  { 0%, 6% { opacity: 0; } 6.1%, 7.5% { opacity: 1; } 7.6%, 9% { opacity: 0; } 9.1%, 10.5% { opacity: 1; } 10.6%, 100% { opacity: 0; } }
  @keyframes appear  { 0%, 7% { opacity: 0; } 8.2%, 100% { opacity: 1; } }
  @keyframes igniteFork { 0%, 31.5% { fill: #8A8A93; } 33% { fill: #FF7A1A; } 100% { fill: #FF7A1A; } }
  @keyframes beatA   { 0%, 12% { opacity: 0; } 13.5% { opacity: 1; } 27.5% { opacity: 1; } 29%, 100% { opacity: 0; } }
  @keyframes beatB   { 0%, 33.5% { opacity: 0; } 35% { opacity: 1; } 55% { opacity: 1; } 56.5%, 100% { opacity: 0; } }
  @keyframes beatC   { 0%, 59% { opacity: 0; } 60.5% { opacity: 1; } 78% { opacity: 1; } 79.5%, 100% { opacity: 0; } }
  @keyframes fadeall { 0% { opacity: 0; } 1% { opacity: 1; } 96.5% { opacity: 1; } 99.5%, 100% { opacity: 0; } }

  /* Highlight rows glow at 6%, never full amber-chrome (color stays reserved for divergence). */
  rect.hl.beatA { animation-name: hlA; }
  rect.hl.beatC { animation-name: hlC; }
  @keyframes hlA { 0%, 12% { opacity: 0; } 13.5% { opacity: 0.06; } 27.5% { opacity: 0.06; } 29%, 100% { opacity: 0; } }
  @keyframes hlC { 0%, 59% { opacity: 0; } 60.5% { opacity: 0.06; } 78% { opacity: 0.06; } 79.5%, 100% { opacity: 0; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .cmd { clip-path: none; }
  }
</style>
<rect x="0.5" y="0.5" width="959" height="581" rx="8" fill="#0A0A0B" stroke="#26262B"/>
<circle cx="22" cy="18.0" r="5.5" fill="#26262B"/><circle cx="40" cy="18.0" r="5.5" fill="#26262B"/><circle cx="58" cy="18.0" r="5.5" fill="#26262B"/>
<text x="480.0" y="22.0" text-anchor="middle" class="title">amberfork demo</text>
<line x1="0" y1="36" x2="960" y2="36" stroke="#26262B"/>
<g class="fadeall">
<rect x="8" y="156" width="944" height="21" rx="3" class="hl beatA"/>
<rect x="8" y="450" width="944" height="21" rx="3" class="hl beatC"/>
<rect x="8" y="492" width="944" height="21" rx="3" class="hl beatC"/>
<text x="20" y="66" class="t cmd" xml:space="preserve"><tspan class="faint">&gt; </tspan>amberfork demo<tspan class="cursor">▍</tspan></text>
<text x="20" y="87" class="t muted appear" xml:space="preserve">  A  refund-good  ·  reference · 10 steps · pass</text>
<text x="20" y="108" class="t muted appear" xml:space="preserve">  B  refund-bad   ·  observed  · 10 steps · fail</text>
<text x="20" y="150" class="t muted appear" xml:space="preserve">  step 00  ·  llm    planner           Plan: look up order 8841, find the refun…  [sync]</text>
<text x="20" y="171" class="t muted appear" xml:space="preserve">  step 01  ·  tool   crm.lookup_order  {"error":"rate_limited","retry_after_ms"…  [log-move]</text>
<text x="20" y="192" class="t muted appear" xml:space="preserve">  step 02  ·  tool   crm.lookup_order  {"category":"electronics","delivered":"2…  [sync]</text>
<text x="20" y="213" class="t muted appear" xml:space="preserve">  step 03  ·  llm    planner           Order 8841: electronics, $129.00, delive…  [sync]</text>
<text x="20" y="234" class="t muted appear" xml:space="preserve">  step 04  ·  tool   kb.search         {"hits":["policy/refunds_v3.md","archive…  [sync]</text>
<text x="20" y="255" class="t appear ignite-fork" xml:space="preserve">⑂ step 05  ✗  tool   kb.fetch          A: Refunds v3 (CURRENT, effective          [FORK · conf 0.68]</text>
<text x="20" y="276" class="t appear ignite-fork" xml:space="preserve">                                       2026-02-01). Electronics: 30-day return</text>
<text x="20" y="297" class="t appear ignite-fork" xml:space="preserve">                                       window from delivery; refund to the</text>
<text x="20" y="318" class="t appear ignite-fork" xml:space="preserve">                                       original payment method.</text>
<text x="20" y="339" class="t appear ignite-fork" xml:space="preserve">                                       B: Refunds v1 (ARCHIVED 2024-11-30,</text>
<text x="20" y="360" class="t appear ignite-fork" xml:space="preserve">                                       superseded). Electronics may be returned</text>
<text x="20" y="381" class="t appear ignite-fork" xml:space="preserve">                                       within 14 days of delivery, for store</text>
<text x="20" y="402" class="t appear ignite-fork" xml:space="preserve">                                       credit only.</text>
<text x="20" y="423" class="t appear" xml:space="preserve"><tspan class="ignite-mark d1">  step 06  ✗  </tspan><tspan class="ignite-body d1">llm    policy_checker    Order is 23 days old — past the 14-day l…  [sync]</tspan></text>
<text x="20" y="444" class="t appear" xml:space="preserve"><tspan class="ignite-mark d2">  step 07  ✗  </tspan><tspan class="ignite-body d2">llm    planner           Policy says no. Draft a polite denial ci…  [sync]</tspan></text>
<text x="20" y="465" class="t appear" xml:space="preserve"><tspan class="ignite-mark d3">  step 07  ✗  </tspan><tspan class="ignite-body d3">tool   payments.refund   {"status":"succeeded","txn":"re_20260708…  [model-move]</tspan></text>
<text x="20" y="486" class="t appear" xml:space="preserve"><tspan class="ignite-mark d4">  step 08  ✗  </tspan><tspan class="ignite-body d4">tool   crm.set_status    {"ok":true}                                [sync]</tspan></text>
<text x="20" y="507" class="t appear" xml:space="preserve"><tspan class="ignite-mark d5">  step 09  ✗  </tspan><tspan class="ignite-body d5">llm    answer            Hi Dana — unfortunately order 8841 falls…  [sync]</tspan></text>
<text x="20" y="528" class="t faint appear" xml:space="preserve">  bundled sample pair · try your own runs:  amberfork diff &lt;bad&gt; --against &lt;good&gt;</text>
<text x="20" y="566" class="cap beatA" xml:space="preserve">1/3 · noise absorbed — B's rate-limit retry is a [log-move], not the fork</text>
<text x="20" y="566" class="cap beatB" xml:space="preserve">2/3 · the fork — same search hits, but B fetched the ARCHIVED v1 policy</text>
<text x="20" y="566" class="cap beatC" xml:space="preserve">3/3 · the cost — payments.refund never runs; a valid refund is denied</text>
</g>
<line x1="0" y1="540" x2="960" y2="540" stroke="#26262B"/>
<text x="940" y="566" text-anchor="end" class="note">terminal output, verbatim</text>
</svg>
