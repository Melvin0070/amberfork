name: release

# Two ways in, one build path:
#   - push a `v*` tag        → build, smoke-test, package, and attach binaries to a GitHub release
#   - workflow_dispatch      → the same build + smoke + package, uploaded only as workflow
#                              artifacts — the pre-tag dry run, so the release path is verified
#                              before a tag ever exists (tags are load-bearing: BENCHMARK.md
#                              rule 2 ties the test-split reveal to them).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # The web bundle is built and staged into the server crate's embed folder BEFORE the
      # cargo build below (D13/D5): rust-embed captures ui-dist/ at compile time, so a binary
      # built over an empty ui-dist/ ships a `serve` that refuses with "bundle missing". This
      # step is the only reason the released `serve` has a UI at all. The UI crate lives
      # outside the cargo workspace (D4) and targets wasm, hence its own toolchain + trunk.
      - uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: build the web UI bundle
        working-directory: ui
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
          trunk build --release

      - name: stage the bundle into the server crate's embed folder
        run: cp -R ui/dist/. crates/amberfork-server/ui-dist/

      - name: build release binary
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
          cargo build --release -p amberfork --target ${{ matrix.target }}

      - name: smoke-test the built binary
        # `demo` forks by design, so exit 1 is the pass condition (diff(1) semantics). Then the
        # release acceptance the dev-build tests can't reach (#28): `serve --demo` must boot over
        # the REAL embedded bundle and answer — proof the UI staged above actually shipped.
        run: |
          bin=target/${{ matrix.target }}/release/amberfork
          "$bin" --version
          "$bin" demo --no-color && exit 1 || test $? -eq 1
          "$bin" serve --demo --port 8177 &
          serve_pid=$!
          trap 'kill $serve_pid 2>/dev/null' EXIT
          index="$(mktemp)"
          for _ in $(seq 1 50); do
            curl -sf http://127.0.0.1:8177/ -o "$index" && break
            sleep 0.2
          done
          grep -q "<title>amberfork</title>" "$index"
          curl -sf http://127.0.0.1:8177/api/document | grep -q '"schema_version"'

      - name: crates.io package carries the embedded bundle (dry run)
        # The `.crate` tarball is what crates.io would receive: assert the server's `include`
        # override actually pulls the (gitignored) built ui-dist/ into it, so a `cargo install`
        # from the registry gets a `serve` with a UI. `--list` needs no registry-resolved deps;
        # `--allow-dirty` because the staged bundle is intentionally untracked.
        run: |
          cargo package -p amberfork-server --list --allow-dirty \
            | grep -qx 'ui-dist/index.html'

      - name: package tarball + checksum
        run: |
          ref="${GITHUB_REF_NAME}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || ref="dry-run"
          name="amberfork-${ref}-${{ matrix.target }}"
          mkdir "$name"
          cp target/${{ matrix.target }}/release/amberfork LICENSE README.md "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: amberfork-${{ matrix.target }}
          path: |
            amberfork-*.tar.gz
            amberfork-*.tar.gz.sha256
          if-no-files-found: error

  release:
    # Tag pushes only — a dispatch run stops at artifacts.
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: guard — tag must match the workspace version
        run: |
          crate_version=$(cargo metadata --no-deps --format-version 1 |
            python3 -c "import json,sys; print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name'] == 'amberfork'))")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "tag v${tag_version} does not match workspace version ${crate_version} — refusing to release"
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: create GitHub release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "amberfork ${GITHUB_REF_NAME}" \
            --generate-notes
