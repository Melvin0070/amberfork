<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>amberfork</title>

    <!-- Trunk compiles the csr binary to wasm. Features are pinned here (not in Cargo's
         defaults) so a plain host `cargo test` stays on ssr while the browser build is csr;
         the two Leptos backends are mutually exclusive. -->
    <link
      data-trunk
      rel="rust"
      data-bin="amberfork-ui"
      data-cargo-features="csr"
      data-cargo-no-default-features
    />

    <style>
      /* DESIGN.md tokens — dark is the primary theme (DD5). Fonts are the metrics-compatible
         fallbacks; the latin-subset Monaspace/General Sans woff2 land in a later slice with
         no layout shift. */
      :root {
        color-scheme: dark;
        --bg: #0a0a0b;
        --surface: #121214;
        --raised: #17171b;
        --hair: #26262b;
        --text: #e6e6e9;
        --muted: #8a8a93;
        --faint: #55555c;
        --amber: #ff7a1a;
        --warning: #f5a623;
        --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh; /* exact viewport height so the CANVAS scrolls, never the whole page */
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 0.875rem;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* The two-pane body: canvas flexes, attribution holds a fixed 320px on the right. Fills
         the height below the header so the pane's border-left runs the full column. */
      .body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* --- The app shell: never a blank page before wasm mounts (D20). The boot node is
             removed by the csr entry once the app is alive; if it survives, boot failed and
             the error state below is revealed in its place. --- */
      .boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        color: var(--muted);
      }

      .boot-glyph {
        font-family: var(--mono);
        font-size: 1.5rem;
        color: var(--faint);
      }

      .boot p {
        max-width: 34rem;
      }

      .boot-hint {
        color: var(--muted);
        font-size: 0.8125rem;
      }

      .boot code {
        font-family: var(--mono);
        color: var(--text);
      }

      .boot--error .boot-glyph {
        color: var(--warning);
      }

      [hidden] {
        display: none !important;
      }

      @media (prefers-reduced-motion: no-preference) {
        .boot-glyph {
          animation: boot-pulse 1.6s ease-in-out infinite;
        }
      }

      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      /* --- Header bar. Mono, compact, quiet: the verdict is the protagonist through the
             `text` token and its position, not color. Zero amber in the header frame. --- */
      .hdr {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding: 0.5rem 0.875rem;
        border-bottom: 1px solid var(--hair);
        background: var(--surface);
        font-family: var(--mono);
        font-size: 0.75rem;
      }

      .logo {
        color: var(--text);
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .logo-glyph {
        color: var(--muted); /* never amber — amber is spent only in the canvas */
      }

      .pair {
        color: var(--text);
      }

      .pair b {
        font-weight: 600;
      }

      .role {
        color: var(--muted);
      }

      .vs {
        color: var(--faint);
      }

      .verdict {
        color: var(--text);
        font-variant-numeric: tabular-nums;
        text-decoration: none;
      }

      .verdict--fork:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .verdict:focus-visible {
        outline: 1px solid var(--hair);
        outline-offset: 2px;
        border-radius: 2px;
      }

      .meta {
        margin-left: auto;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      /* --- The alignment canvas: side-by-side runs on the shared spine. Sameness recedes
             (muted), divergence glows (amber on the fork + every downstream row). Amber is
             spent here and nowhere else. DOM rows carry selectable text; the SVG overlay
             draws the timeline rail, the amber divergent-path segment, and the fork node,
             both keyed to the 30px row pitch so they line up. --- */
      .canvas {
        flex: 1;
        min-width: 0; /* let the flex child shrink so its own overflow engages */
        min-height: 12rem;
        overflow: auto; /* the canvas is the scroll container — header + pane stay fixed */
      }

      /* Fills the canvas viewport (dotted field), with the bounded rows left-anchored on top.
         When the rows are wider than the canvas the canvas alone scrolls (DD4 canvas-only
         horizontal scroll) — the header and attribution pane never move. */
      .track {
        position: relative;
        min-height: 100%;
        background-image: radial-gradient(circle, var(--hair) 1px, transparent 1px);
        background-size: 22px 22px;
      }

      .spine {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }
      .spine-rail {
        stroke: var(--faint); /* the quiet shared timeline */
        stroke-width: 1;
      }
      .spine-path {
        stroke: var(--amber); /* the divergent path made literal; the ignition beat animates it */
        stroke-width: 2;
      }
      .fork-node {
        fill: var(--amber);
      }

      .rows {
        list-style: none;
        width: fit-content; /* hug the two bounded runs; the fork band never spans dead space */
        margin-left: 28px; /* clear the 28px SVG spine strip */
        padding: 18px 0; /* 18px top pad matches the geometry's TOP_PAD */
      }

      /* Fixed side columns, not 1fr: the two runs sit adjacent as one comparison instead of
         stretching to opposite edges, and the layout anchors left — leaving the right open for
         the attribution pane (slice 2). Same template on every row keeps the columns aligned. */
      .row {
        display: grid;
        grid-template-columns: 104px 300px 300px auto;
        align-items: center;
        column-gap: 18px;
        height: 30px; /* == ROW_H; the SVG overlay is computed from the same pitch */
        padding: 0 14px;
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        cursor: pointer;
        scroll-margin-top: 96px; /* auto-scroll lands the fork in the upper third, not the edge */
      }
      /* Hover tint (never on the selected row) and a clear focus-visible ring. The ring is a
         box-shadow, not an outline, so it never overrides the fork's dashed amber cue. */
      .row:hover:not(.row--selected) {
        background: var(--surface);
      }
      .row:focus-visible {
        outline: none;
        box-shadow: inset 0 0 0 2px var(--muted);
      }

      .gutter {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .cue {
        width: 0.9em;
        display: inline-block;
        text-align: center;
        color: var(--faint);
      }
      .idx {
        color: var(--muted);
      }

      .cell {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }
      .kind {
        width: 40px;
        color: var(--faint);
      }
      .name {
        width: 104px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sum {
        flex: 1;
        min-width: 0;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .slot-trunc {
        color: var(--muted); /* the honest cut mark — never silently shortened */
      }

      /* Divergence glows: the fork and every downstream row in one uniform amber (no intensity
         grading — one scarce accent). The dashed outline is the fork's redundant non-color cue;
         `outline` never shifts layout, so the row stays 30px and the SVG stays aligned. */
      .row--fork {
        color: var(--amber);
        background: rgba(255, 122, 26, 0.05);
        border-radius: 4px;
        outline: 1px dashed var(--amber);
        outline-offset: -1px;
      }
      .row--down {
        color: var(--amber);
      }
      .row--fork .idx,
      .row--fork .kind,
      .row--fork .name,
      .row--fork .sum,
      .row--fork .cue,
      .row--down .idx,
      .row--down .kind,
      .row--down .name,
      .row--down .sum,
      .row--down .cue {
        color: var(--amber);
      }
      .tag {
        justify-self: end;
        white-space: nowrap; /* the [FORK · conf] tag stays on the fork's single 30px row */
        color: var(--amber);
        font-variant-numeric: tabular-nums;
      }

      /* Selection is the neutral frame: raised surface + a hairline ring (inset box-shadow, so
         no layout shift). Never amber (DD2) — the default-selected fork keeps its amber role via
         `row--fork` and only gains the raised surface + hairline on top. Placed after the role
         rules so its raised background wins over the fork's amber tint. */
      .row--selected {
        background: var(--raised);
        box-shadow: inset 0 0 0 1px var(--hair);
      }

      /* --- Attribution pane: the diff's one answer in DR5 order. No amber, no red/green — a
             statement ABOUT the divergence, not the divergence itself. --- */
      .attr {
        flex: 0 0 320px;
        border-left: 1px solid var(--hair);
        background: var(--surface);
        padding: 16px 18px;
        font-family: var(--mono);
        font-size: 0.75rem;
        overflow-y: auto;
      }
      .attr-title {
        margin-bottom: 14px;
        font-size: 0.625rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .attr-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .attr-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 14px;
      }
      .attr-row dt {
        color: var(--muted);
      }
      .attr-row dd {
        color: var(--text);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .attr-empty {
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot" role="status" aria-live="polite">
        <span class="boot-glyph" aria-hidden="true">⑂</span>
        <p>Loading the fork…</p>
      </div>
      <div class="boot boot--error" role="alert" hidden>
        <span class="boot-glyph" aria-hidden="true">⑂</span>
        <p>amberfork couldn't start in this browser.</p>
        <p class="boot-hint">
          The local view needs WebAssembly. Read the diff in your terminal, or restart with
          <code>amberfork serve &lt;bad&gt; --against &lt;good&gt;</code>.
        </p>
      </div>
    </div>

    <noscript>
      <div class="boot">
        <p>amberfork's local view needs JavaScript and WebAssembly.</p>
        <p class="boot-hint">
          The full diff is already in your terminal — run <code>amberfork diff &lt;bad&gt; --against &lt;good&gt;</code>.
        </p>
      </div>
    </noscript>

    <script>
      // If wasm never boots, the csr entry never runs and #boot survives; flip it from
      // loading to the error state so the page never sits on a dead spinner. The mounted
      // app removes #boot wholesale, so a surviving node is the honest signal of failure.
      (function () {
        function showBootError() {
          var boot = document.getElementById("boot");
          if (!boot) return; // app mounted — nothing to do
          var loading = boot.querySelector(".boot:not(.boot--error)");
          var error = boot.querySelector(".boot--error");
          if (loading) loading.hidden = true;
          if (error) error.hidden = false;
        }
        addEventListener("error", showBootError);
        addEventListener("unhandledrejection", showBootError);
      })();
    </script>
  </body>
</html>
